name: release

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Build
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          go build \
            -ldflags "-X github.com/239what475/remote-kind/pkg/cluster.Version=v${VERSION} \
                      -X github.com/239what475/remote-kind/pkg/cluster.GitCommit=$(git rev-parse --short HEAD) \
                      -X github.com/239what475/remote-kind/pkg/cluster.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o remote-kind ./cmd/remote-kind/
      - uses: softprops/action-gh-release@v2
        with:
          files: remote-kind
          generate_release_notes: true
